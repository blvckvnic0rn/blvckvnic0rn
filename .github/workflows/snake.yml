name: Generate Snake Animation

on:
  schedule:
    # Esegui il workflow una volta al giorno alle 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Consente l'esecuzione manuale del workflow

jobs:
  generate-snake:
    runs-on: ubuntu-latest
    steps:
      # Clona il repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Genera l'animazione Snake
      - name: Generate Snake
        uses: Platane/snk@v2
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Controlla che il file sia stato generato
      - name: Ensure Snake SVG exists
        run: |
          ls dist
          test -f dist/github-contribution-grid-snake.svg

      # Pubblica il file generato nella branch "output"
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
